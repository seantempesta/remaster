# Remaster mpv configuration for real-time video enhancement.
#
# Copy to %APPDATA%/mpv/mpv.conf or pass via: mpv --include=remaster/mpv.conf
#
# Requires VapourSynth + vs-mlrt installed. First playback with a new model
# will build a TensorRT engine (~2-5 min, cached for subsequent plays).

# Hardware decode with copy-back (required for VapourSynth filter)
hwdec=auto-copy

# NAFNet enhancement filter — update path to match your install
# vf=vapoursynth="C:/Users/sean/src/upscale-experiment/remaster/play.vpy"
