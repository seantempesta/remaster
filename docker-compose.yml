# Remaster -- GPU video enhancement pipeline
#
# Setup:
#   1. Edit the volume mount below to point to your video directory
#   2. docker compose build
#
# Usage:
#   docker compose run remaster /data/episode.mkv /data/enhanced/episode.mkv
#   docker compose run remaster /data/episode.mkv /data/enhanced/episode.mkv --cq 20
#   docker compose run remaster --batch /data/originals/ /data/enhanced/
#   docker compose run --entrypoint bash remaster   # debug shell
#
# The TRT engine is built on first run (~2 min) and cached automatically.

services:
  remaster:
    image: ghcr.io/seantempesta/remaster
    build: .
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu, video]
    environment:
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
    volumes:
      # >>> EDIT THIS: point to the directory containing your video files <<<
      - ~/Videos:/data
      # Engine cache (persists across container restarts, ~3 MB per resolution)
      - remaster-engines:/app/engines

volumes:
  remaster-engines:
