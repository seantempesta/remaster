# Remaster — GPU video enhancement pipeline
#
# Usage:
#   docker compose build                    # build the image (~15 min first time)
#   docker compose run remaster bash         # interactive shell
#   docker compose run remaster encode input.mkv output.mkv  # encode a file
#
# GPU passthrough requires NVIDIA Container Toolkit:
#   https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html

services:
  remaster:
    build: .
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    # Mount video directories
    volumes:
      # Source videos (read-only)
      - type: bind
        source: ${VIDEO_INPUT:-./data}
        target: /videos/input
        read_only: true

      # Output directory (read-write)
      - type: bind
        source: ${VIDEO_OUTPUT:-./data/output}
        target: /videos/output

      # Checkpoints (read-only, for model weights)
      - type: bind
        source: ./checkpoints
        target: /app/checkpoints
        read_only: true

      # Persistent cache for AOT compiled kernels
      - remaster-cache:/app/.cache

    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility
      - TORCH_INDUCTOR_CACHE_DIR=/app/.cache/inductor

    # Default: interactive shell
    entrypoint: ["python", "remaster/encode.py"]

volumes:
  remaster-cache:
    name: remaster-cache
